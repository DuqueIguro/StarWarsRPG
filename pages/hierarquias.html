<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal de Hierarquias Galácticas</title>
    <link rel="stylesheet" href="../styles/hierarquias.css">
    <link rel="shortcut icon" href="../img/Death_Star.ico" type="image/x-icon">
</head>
<body>
    <!-- Efeito de interferência holográfica global -->
    <div class="hologram-overlay"></div>

    <div class="selection-container">
        
        <!-- LADO REBELDE (AZUL) -->
        <a href="hierarquiaGerais" class="faction-side rebel-side">
            <div class="glow-effect"></div>
            <div class="content">
                <img src="../img/rebelde.png" alt="Aliança Rebelde" class="faction-logo">
                <h2 class="faction-title">ALIANÇA REBELDE</h2>
                <span class="aurebesh-text">REBEL ALLIANCE</span>
                <p class="description">Acesse a cadeia de comando da Resistência e registros de células livres.</p>
                <div class="terminal-btn">ACESSAR TERMINAL</div>
            </div>
        </a>

        <!-- LADO IMPERIAL (VERMELHO) -->
        <a href="hierarquiaImperio" class="faction-side empire-side">
            <div class="glow-effect"></div>
            <div class="content">
                <img src="../img/imperio.png" alt="Império Galáctico" class="faction-logo">
                <h2 class="faction-title">IMPÉRIO GALÁCTICO</h2>
                <span class="aurebesh-text">GALACTIC EMPIRE</span>
                <p class="description">Propriedade do COMPNOR. Acesso restrito a oficiais autorizados do Alto Comando.</p>
                <div class="terminal-btn">INICIAR DIRETRIZ</div>
            </div>
        </a>

    </div>
</body>
</html>
